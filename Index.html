<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 Be My Valentine</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  background: radial-gradient(circle, #ff4d6d, #ff8fa3);
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* TITLE */
h1 {
  color: white;
  font-size: 38px;
  text-align: center;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  50% { transform: scale(1.08); }
}

/* BUTTONS */
.btn {
  padding: 14px 30px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin: 10px;
}

#yes {
  background: #ff0054;
  color: white;
}

#no {
  background: white;
  position: absolute;
}

/* 💖 HIDDEN-BUT-WORKING YOUTUBE PLAYER */
.player-box {
  position: fixed;
  bottom: 8px;
  right: 8px;
  width: 160px;
  height: 90px;
  opacity: 0.01;   /* almost invisible */
  z-index: 1;
  pointer-events: none;
}

#ytplayer {
  width: 100%;
  height: 100%;
}

/* HEARTS */
.heart {
  position: absolute;
  animation: float 5s linear infinite;
  pointer-events: none;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* CONFETTI */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: 0;
  animation: fall 2s linear forwards;
}

@keyframes fall {
  to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* MODAL */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal {
  width: 420px;
  max-width: 95%;
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
}

iframe {
  width: 100%;
  height: 400px;
  border: none;
  border-radius: 12px;
}
</style>
</head>

<body>

<h1 id="title">Will You Be My Valentine? 💖</h1>

<div>
  <button class="btn" id="yes">Yes 💘</button>
  <button class="btn" id="no">No 💔</button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="stepText">Loading...</h2>
    <iframe id="frame"></iframe>
  </div>
</div>

<!-- 🎵 YouTube Hidden Background Player -->
<div class="player-box">
  <div id="ytplayer"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;

/* 🎵 YouTube INIT */
function onYouTubeIframeAPIReady() {
  player = new YT.Player('ytplayer', {
    videoId: 'JT1XJnVmABo',
    playerVars: {
      controls: 0,
      modestbranding: 1,
      rel: 0,
      loop: 1,
      playlist: 'JT1XJnVmABo'
    }
  });
}

/* 💖 HEARTS */
setInterval(() => {
  let h = document.createElement("div");
  h.innerHTML = "💖";
  h.className = "heart";
  h.style.left = Math.random() * window.innerWidth + "px";
  h.style.fontSize = (10 + Math.random() * 30) + "px";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 5000);
}, 120);

/* 💔 NO BUTTON */
const noBtn = document.getElementById("no");

function runaway() {
  noBtn.style.left = Math.random() * (window.innerWidth - 80) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 80) + "px";
}

document.addEventListener("mousemove", (e) => {
  const r = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - r.left, e.clientY - r.top);
  if (dist < 140) runaway();
});

noBtn.onclick = runaway;

/* 🎉 CONFETTI */
function firecrackers() {
  for (let i = 0; i < 140; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * window.innerWidth + "px";
    c.style.background = ["#ff0","#f0f","#0ff","#fff"][Math.floor(Math.random()*4)];
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

/* 💖 YES CLICK */
document.getElementById("yes").onclick = () => {

  document.getElementById("title").style.display = "none";
  document.getElementById("overlay").style.display = "flex";

  const frame = document.getElementById("frame");
  const text = document.getElementById("stepText");

  /* 🎵 SAFE PLAY */
  if (player) {
    player.mute();
    player.playVideo();

    setTimeout(() => {
      player.unMute();
      player.setVolume(70);
    }, 800);
  }

  text.innerText = "Hey Sweetheart… you said YES 💖";
  firecrackers();

  setTimeout(() => {
    text.innerText = "Sending love 💌";
    frame.src = "https://tenor.com/embed/15970385";

    setTimeout(() => {
      text.innerText = "You made my day ❤️";
      frame.src = "https://tenor.com/embed/27082199";

      setTimeout(() => {
        text.innerText = "More love coming 💕";
        frame.src = "https://tenor.com/embed/1297910365388270345";

        setTimeout(() => {
          window.location.href = "https://instagram.com/your_username";
        }, 4000);

      }, 4500);

    }, 4500);

  }, 3000);
};

/* 📛 NAME PARAM */
const params = new URLSearchParams(location.search);
const name = params.get("name");

if (name) {
  document.getElementById("title").innerText =
    `Will You Be My Valentine, ${name}? 💖`;
}

</script>

</body>
</html>
